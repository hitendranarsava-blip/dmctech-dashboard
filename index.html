<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        h2 { border-bottom: 2px solid #0f0; text-shadow: 0 0 10px #0f0; padding-bottom: 10px; }
        
        .breadcrumb { margin-bottom: 20px; cursor: pointer; color: #0f0; text-decoration: underline; }
        
        #explorer { display: flex; flex-wrap: wrap; gap: 20px; }

        .item { 
            border: 1px solid #0f0; padding: 15px; width: 150px; text-align: center;
            cursor: pointer; transition: 0.3s; border-radius: 8px; background: rgba(0,255,0,0.05);
        }
        .item:hover { background: #0f0; color: #000; box-shadow: 0 0 15px #0f0; }
        .item.folder { border-style: solid; }
        .item.file { border-style: dashed; }
        
        .icon { font-size: 40px; margin-bottom: 10px; }
        h3 { font-size: 0.9rem; margin: 0; word-wrap: break-word; }
    </style>
</head>
<body>
    <h2>DMCTECH SECURE DRIVE</h2>
    <div id="back-btn" class="breadcrumb" style="display:none;" onclick="showFolders()">← Back to Folders</div>
    
    <div id="explorer">
        <p>Loading Drive...</p>
    </div>

    <script>
        let allData = {};

        // 1. Firebase se pura data ek baar mein fetch karein
        async function initDrive() {
            try {
                // Hum poora database fetch kar rahe hain taaki speed fast rahe
                const response = await fetch('https://dmc-mobile-repair-default-rtdb.firebaseio.com/.json');
                allData = await response.json();
                showFolders();
            } catch (e) {
                document.getElementById('explorer').innerHTML = "Connection Error!";
            }
        }

        // 2. Folders dikhane ka function
        function showFolders() {
            const container = document.getElementById('explorer');
            const backBtn = document.getElementById('back-btn');
            container.innerHTML = '';
            backBtn.style.display = 'none';

            const folders = allData.Folders;
            for (let id in folders) {
                const div = document.createElement('div');
                div.className = 'item folder';
                div.onclick = () => showFiles(id, folders[id].FolderName);
                div.innerHTML = `<div class="icon">📁</div><h3>${folders[id].FolderName}</h3>`;
                container.appendChild(div);
            }
        }

        // 3. Folder ke andar ki Files dikhane ka function (Single Click par)
        function showFiles(folderId, folderName) {
            const container = document.getElementById('explorer');
            const backBtn = document.getElementById('back-btn');
            container.innerHTML = '';
            backBtn.style.display = 'block';
            backBtn.innerText = `← Back (Inside: ${folderName})`;

            const files = allData.DataFiles && allData.DataFiles[folderId];
            
            if (files) {
                // Agar files mil gayi toh list dikhao
                const div = document.createElement('div');
                div.className = 'item file';
                // DOUBLE CLICK par C# ko signal bhejega
                div.ondblclick = () => openFile(folderId); 
                div.innerHTML = `<div class="icon">📄</div><h3>${files.FileName}</h3><small>(Double Click to Open)</small>`;
                container.appendChild(div);
            } else {
                container.innerHTML = "<p>Is folder mein koi file nahi hai.</p>";
            }
        }

        function openFile(fileId) {
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(fileId);
            } else {
                alert("Opening File ID: " + fileId);
            }
        }

        window.onload = initDrive;
    </script>
</body>
</html>
