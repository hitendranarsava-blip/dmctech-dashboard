<!DOCTYPE html>
<html>
<head>
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Segoe UI', sans-serif; }
        .card { 
            border: 1px solid #0f0; 
            padding: 20px; 
            margin: 10px; 
            display: inline-block; 
            cursor: pointer;
            transition: 0.3s;
        }
        .card:hover { background: #0f0; color: #000; box-shadow: 0 0 15px #0f0; }
    </style>
</head>
<body>
    <h2>DMCTECH SECURE DRIVE</h2>
    
    <div class="card" onclick="openFile('folder_basic_001')">
        <h3>📁 BASIC ELECTRICAL</h3>
        <p>Click to View Slides</p>
    </div>

    <script>
        function openFile(fileId) {
            // Yeh line C# ke 'WebView_WebMessageReceived' function ko signal bhejti hai
            window.chrome.webview.postMessage(fileId);
        }
    </script>
</body>
</html>
